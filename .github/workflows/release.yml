name: Publish to npm

# Publishes the `shipsilently` package to the public npm registry.
#
# Triggers:
#   • Pushing a `v*` tag (this is what the upstream mirror does automatically).
#   • Publishing a GitHub Release.
#   • Manual dispatch (defaults to a dry run so you can rehearse safely).
#
# Required repo secret:
#   NPM_TOKEN  — an npm "Automation" token for the account/org that owns the
#                `shipsilently` package. Settings → Secrets and variables →
#                Actions → New repository secret.

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm publish in --dry-run mode (no upload)'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # required for npm provenance

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Build, test & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run type-check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Validate package exports & types
        run: bunx @arethetypeswrong/cli@latest --pack .

      - name: Verify package version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version $PKG_VERSION matches tag."

      - name: Publish to npm
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry run — packing without publishing:"
            npm publish --provenance --access public --dry-run
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
